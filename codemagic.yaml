workflows:
  ios-workflow:
    name: iOS Release
    environment:
      # 删掉了 ios_signing 模块，不需要签名！
      flutter: stable
      xcode: "15.4" # 锁死 Xcode 15.4
    scripts:
      - name: Set up local properties
        script: echo "flutter.minSdkVersion=21" > "$CM_BUILD_DIR/android/local.properties"
      - name: Get Flutter packages
        script: flutter packages pub get
      - name: Install Go and gomobile
        script: |
          brew install go
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init
      - name: Build Go Framework
        script: |
          cd core
          go get golang.org/x/mobile
          gomobile bind -target=ios -o ../ios/Frameworks/Core.xcframework .
          cd ..
      - name: Build iOS
        script: |
          # 明确告诉 Flutter 不签名
          flutter build ios --release --no-codesign
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r ../../torrent_app.ipa Payload
    artifacts:
      - build/torrent_app.ipa