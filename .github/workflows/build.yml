name: Build iOS IPA with Go Engine

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.0'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Build Go Framework for iOS
        run: |
          cd core
          # 核心修复：临时满足新版 gomobile 的依赖检查，编译后恢复原样
          go get golang.org/x/mobile
          gomobile bind -target=ios -o ../ios/Frameworks/Core.xcframework .
          # 恢复 go.mod 和 go.sum，防止影响后续 Flutter 解析
          git checkout go.mod go.sum
          cd ..

      - name: Install Flutter Dependencies
        run: |
          flutter precache --ios
          flutter pub get

      - name: Fix Xcode and Generate iOS Plugins
        run: |
          sudo xcode-select --switch /Applications/Xcode_15.2.app/Contents/Developer
          cd ios
          pod deintegrate || true
          rm Podfile || true
          flutter pub get
          flutter build ios --config-only --no-codesign
          cd ..

      - name: Build iOS IPA (No Codesign)
        run: |
          flutter build ios --release --no-codesign
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r ../../torrent_app.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: torrent-app-ipa
          path: build/torrent_app.ipa