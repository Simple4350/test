name: Build iOS IPA with Go Engine

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      # 核心改变：不再限制 Go 版本，直接用最新的 Go 1.26
      # 这样 gomobile 和 mobile 依赖的升级要求会被自然满足，不会再报错
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '^1.26.0'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Build Go Framework for iOS
        run: |
          cd core
          go get golang.org/x/mobile
          gomobile bind -target=ios -o ../ios/Frameworks/Core.xcframework .
          git checkout go.mod go.sum
          cd ..

      - name: Install Flutter Dependencies
        run: |
          flutter precache --ios
          flutter pub get

      - name: Fix Xcode and Generate iOS Plugins
        run: |
          sudo xcode-select --switch /Applications/Xcode_15.4.app/Contents/Developer
          # 强制生成缺失的插件文件夹
          flutter build ios --config-only --no-codesign
          cd ios
          pod deintegrate || true
          rm Podfile || true
          flutter pub get
          cd ..

      - name: Build iOS IPA (No Codesign)
        run: |
          flutter build ios --release --no-codesign
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r ../../torrent_app.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: torrent-app-ipa
          path: build/torrent_app.ipa