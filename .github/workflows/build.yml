name: Build iOS IPA with Go Engine

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '^1.26.0'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Build Go Framework for iOS
        run: |
          cd core
          go get golang.org/x/mobile
          gomobile bind -target=ios -o ../ios/Frameworks/Core.xcframework .
          git checkout go.mod go.sum
          cd ..

      - name: Install Flutter Dependencies
        run: |
          flutter precache --ios
          flutter pub get

      - name: Fix Xcode and Build IPA
        run: |
          sudo xcode-select --switch /Applications/Xcode_15.4.app/Contents/Developer
          
          cd ios
          
          # 强制回退到 CocoaPods 模式，彻底抛弃 SPM
          # 1. 创建一个标准的 Podfile
          cat > Podfile <<'EOF'
          # 新增：引入 Flutter 的 Pod 配置模块
          require File.expand_path(File.join('..', 'Flutter', 'PodfileHelper.rb'), __FILE__)
          require File.expand_path(File.join('..', 'Flutter', 'Generated', 'xcode_backend.rb'), __FILE__)
          
          # Uncomment the next line to define a global platform for your project
          # Uncomment the next line to define a global platform for your project
          platform :ios, '13.0'
          
          target 'Runner' do
            # Comment the next line if you don't want to use dynamic frameworks
            use_frameworks!
          
            # Pods for Runner
            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))
          end
          
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
            end
          end
          EOF
          
          # 2. 执行 pod install 安装插件依赖
          pod install --repo-update
          cd ..
          
          # 3. 直接编译打包
          flutter build ios --release --no-codesign
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r ../../torrent_app.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: torrent-app-ipa
          path: build/torrent_app.ipa