name: Build iOS IPA with Go Engine

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '^1.26.0'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Build Go Framework for iOS
        run: |
          cd core
          go get golang.org/x/mobile
          gomobile bind -target=ios -o ../ios/Frameworks/Core.xcframework .
          git checkout go.mod go.sum
          cd ..

      - name: Install Flutter Dependencies
        run: |
          flutter precache --ios
          flutter pub get

      - name: Fix Xcode and Build IPA
        run: |
          sudo xcode-select --switch /Applications/Xcode_15.4.app/Contents/Developer
          # 核心修复：创建文件夹和空的 Package.swift 骗过 Xcode SPM 检查
          mkdir -p ios/Flutter/ephemeral/Packages/FlutterGeneratedPluginSwiftPackage
          echo '// swift-tools-version:5.9
          import PackageDescription
          let package = Package(
              name: "FlutterGeneratedPluginSwiftPackage",
              platforms: [.iOS(.v11)],
              products: [.library(name: "FlutterGeneratedPluginSwiftPackage", targets: ["FlutterGeneratedPluginSwiftPackage"])],
              targets: [.target(name: "FlutterGeneratedPluginSwiftPackage", path: "")]
          )' > ios/Flutter/ephemeral/Packages/FlutterGeneratedPluginSwiftPackage/Package.swift
          
          # 清除 Xcode SPM 缓存
          rm -rf ~/Library/Caches/org.swift.swiftpm || true
          
          # 直接一步编译打包
          flutter build ios --release --no-codesign
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r ../../torrent_app.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: torrent-app-ipa
          path: build/torrent_app.ipa